version: '3.8'

services:
  # ── PostgreSQL (Production Database) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reassist
      POSTGRES_USER: reassist
      POSTGRES_PASSWORD: reassist_prod_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reassist"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://reassist:reassist_prod_2024@postgres:5432/reassist
      - JWT_SECRET=change-this-in-production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
