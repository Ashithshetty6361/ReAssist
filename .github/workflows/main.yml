name: ReAssist CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Verify Integrations
      run: |
        python -c "from root_agent import create_root_agent; print('Root orchestrator logic compiles')"
        python -c "from evaluation.evaluator import create_evaluator; print('Evaluator logic compiles')"

